<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Выбор группы -->
<div id="group-selection" class="screen">
    <button id="settings-btn" class="settings-fab" aria-label="Открыть настройки">⚙️</button>
    <h2 class="group-title">Выберите группу</h2>
    <div id="groups"></div>
    <div id="early-testers-panel" class="early-testers-panel" role="note"></div>
</div>

<!-- Главное расписание -->
<div id="main-screen" class="screen hidden">
    <div id="week-month-caption" class="week-month-caption" aria-live="polite"></div>
    <div class="header">
        <button id="exit">⏏</button>
        <div id="current-day"></div>
        <label id="calendar" class="calendar-picker" aria-label="Выбор даты">
            <span>📅</span>
            <input type="date" id="calendar-input" class="calendar-input-overlay">
        </label>
    </div>
    <div id="week-days"></div>

    <div id="schedule-container"></div>
</div>

<div id="lesson-modal" class="lesson-modal hidden" role="dialog" aria-modal="true" aria-labelledby="lesson-modal-title">
    <div class="lesson-modal-backdrop" data-lesson-modal-close></div>
    <div class="lesson-modal-card">
        <button type="button" class="lesson-modal-close" data-lesson-modal-close aria-label="Закрыть">×</button>
        <h2 id="lesson-modal-title" class="lesson-modal-heading"></h2>
        <div id="lesson-modal-body" class="lesson-modal-body"></div>
    </div>
</div>

<!-- Настройки -->
<div id="settings-screen" class="screen hidden">
    <div class="settings-card">
        <h2 class="settings-title">Настройки</h2>

        <div class="settings-section">
            <div class="settings-section-title">Цвета видов занятий</div>
            <label class="settings-row">
                <span>Лекция</span>
                <input type="color" id="color-lecture" class="color-picker">
            </label>
            <label class="settings-row">
                <span>Практика</span>
                <input type="color" id="color-practice" class="color-picker">
            </label>
            <label class="settings-row">
                <span>Лабораторная</span>
                <input type="color" id="color-lab" class="color-picker">
            </label>
        </div>

        <div class="settings-section">
            <div class="settings-section-title">Подгруппы</div>
            <label class="settings-row settings-toggle-row">
                <span>Показывать номер подгруппы</span>
                <span class="toggle-switch">
                    <input type="checkbox" id="show-subgroup">
                    <span class="toggle-slider"></span>
                </span>
            </label>
            <label class="settings-row">
                <span>Моя подгруппа</span>
                <select id="subgroup-number">
                    <option value="">Все</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </label>
        </div>

        <div class="settings-actions">
            <button id="close-settings" class="btn-secondary">Закрыть</button>
            <button id="save-settings" class="btn-primary">Сохранить</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
